name: install

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

env:
  TERM: xterm

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [macos, raspi, ubuntu]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ansible
        run: pip3 install ansible
      - name: Install ansible-lint
        run: |
          pip3 install ansible-lint
          ansible-lint --version
      - name: Run ansbile-lint
        run: ansible-lint ./envs/${{ matrix.os }}/playbook.yaml

  linux:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: envs/ubuntu
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ansible
        run: sudo apt update && sudo apt install -y ansible
      - name: ansible version
        run: ansible --version
      - name: (Dryrun) Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml --check --diff
      - name: 1st Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml
      - name: (Dryrun) Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml --check --diff
      - name: 2nd Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml
      - name: (Dryrun) Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml --check --diff

  macos:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [macos-26, macos-15]
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
        working-directory: envs/macos
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install ansible
        run: brew install ansible
      - name: ansible version
        run: ansible --version
      - name: (Dryrun) Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml --check --diff
      - name: 1st Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml
      - name: (Dryrun) Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml --check --diff
      - name: 2nd Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml
      - name: (Dryrun) Run Ansible Playbook
        run: ansible-playbook -i hosts playbook.yaml --check --diff

  windows:
    runs-on: windows-2025
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        shell: powershell
        working-directory: envs/windows
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: MinoruSekine/setup-scoop@371e1c778465fed5ee2101c415bead47553e1a07 # v5.0.0

      - name: scoop version
        run: scoop --version
      - name: Install Modules
        run: |

          Install-Module PowerShell-Yaml -Force -Scope CurrentUser
          Install-Module ScoopPlaybook -Force -Scope CurrentUser

      - name: 1st Run ScoopPlaybook
        run: Scoop-Playbook
      - name: 2nd Run ScoopPlaybook
        run: Scoop-Playbook

  complete:
    needs: [lint, linux, macos, windows]
    runs-on: ubuntu-24.04
    permissions: {}
    timeout-minutes: 3
    steps:
      - name: Lint & Install complete
        run: echo "Lint & Install complete for all platforms."
